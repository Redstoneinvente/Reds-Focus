<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirecting...</title>
    <script>
      const pathSegmentsToKeep = 1;
      const { pathname, search, hash } = window.location;
      const redirectPath =
        pathname
          .split("/")
          .slice(1)
          .map((segment) => segment ? encodeURIComponent(segment) : "")
          .join("/");

      window.location.replace(
        `${window.location.origin}/${pathname.split("/").slice(1, 1 + pathSegmentsToKeep).join("/")}/?p=/${redirectPath}${search ? `&q=${encodeURIComponent(search.slice(1))}` : ""}${hash}`
      );
    </script>
  </head>
  <body></body>
</html>
